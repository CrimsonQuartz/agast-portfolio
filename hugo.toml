baseURL = 'https://agast.net/'
languageCode = 'en-us'
title = 'agast.net | Andrew Gast'
theme = "terminal"
pagination.pagerSize = 5

[params]
  # Custom Assets
  site_logo = "/images/favicon.png"
  favicon = "/images/favicon.ico"
  images = ["og-image.png"] # Fixed: Theme expects a list []

  # Layout Settings
  contentTypeName = "posts"
  showMenuItems = 4 
  fullWidthTheme = false
  centerTheme = true #
  autoCover = true
  showLastUpdated = true
  readingTime = true
  themeColor = ""
[languages]
  [languages.en]
    languageName = "English"
    title = "agast.net"
    site_logo = "/favicon.png"
    favicon = "/favicon.ico"


    [languages.en.params]
      subtitle = "Cybersecurity | AAS @ STLCC | BS @ UMSL"
      copyright = "Andrew Gast"
      menuMore = "Show more"
      readMore = "Read more"
      readOtherPosts = "Read other posts"
      missingContentMessage = " - Terminal Session Lost"
      customCSS = ["css/terminal.css"]
      favicon = "favicon.ico"
      [languages.en.params.logo]
        logoText = "agast.net:~$"
        logoHomeLink = "/"
	site_logo ="favicon.png"
      # Navigation Menu
      [[languages.en.menu.main]]
        identifier = "home"
        name = "Home"
        url = "/"
        weight = 1

      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
        weight = 2

      [[languages.en.menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/projects"
        weight = 3

      [[languages.en.menu.main]]
        identifier = "blog"
        name = "Blog"
        url = "/posts"
        weight = 4
